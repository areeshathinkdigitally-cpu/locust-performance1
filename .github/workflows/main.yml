name: Locust Performance CI

on:
  push:
    branches: [ "master" ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  locust:
    runs-on: ubuntu-latest
    env:
      TARGET_HOST: https://api-cycle-dev.azurewebsites.net
      STRICT_SLA: "false"
      LOCUST_FAIL_RATIO_MAX: "0.01"
      LOCUST_P95_MAX_MS: "2000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Locust (headless)
        run: |
          mkdir -p reports
          locust -f weeks/week7_8_scaling_ci.py \
            --headless -u 5 -r 1 -t 1m \
            --host "${TARGET_HOST}" \
            --html reports/index.html \
            --csv reports/locust

      - name: Quality gate
        run: |
          python scripts/check_thresholds.py reports/locust_stats.csv

      # This prepares the folder for Pages deploy
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  deploy_pages:
    needs: locust
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
