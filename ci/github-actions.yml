name: locust-performance
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"  # Mondays 02:00 UTC (example)
jobs:
  run-locust:
    runs-on: ubuntu-latest
    env:
      TARGET_HOST: https://YOUR_BASE_URL
      LOCUST_USERS_CSV: data/users.example.csv
      LOCUST_FAIL_RATIO_MAX: "0.01"
      LOCUST_P95_MAX_MS: "1200"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Locust
        run: |
          mkdir -p reports
          locust -f weeks/week7_8_scaling_ci.py --headless -t 10m -u 100 -r 10             --host "$TARGET_HOST" --html reports/locust_report.html --csv reports/locust
      - name: Gate
        run: |
          python scripts/check_thresholds.py reports/locust_stats.csv
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: locust-reports
          path: reports
